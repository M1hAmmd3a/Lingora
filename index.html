<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0B18" />
<title>Lingoora — كل لغة نجمة في سمائها</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="starfield"></div>

<div class="brandbar">
  <div class="brand">
    <div class="mark">Lg</div>
    <div>
      <div class="wordmark">Lingoora</div>
      <small id="brandSub">كل لغة نجمة في سمائها</small>
    </div>
  </div>
  <div id="whoami" style="display:none;">
    <span>مرحبًا، <span class="name" id="whoamiName"></span></span>
    <button class="ghost-btn" id="logoutBtn">تسجيل الخروج</button>
  </div>
</div>

<!-- ================= AUTH SCREEN ================= -->
<div id="authScreen">
  <div class="constellation" id="constellation"></div>

  <div class="authcard">
    <h1>ابدأ رحلتك مع Lingoora</h1>
    <p class="sub">تحدّث بلغتك، ويصل صوتك بلغة صديقك.</p>

    <div class="tabs">
      <button id="tabLogin" class="active">تسجيل الدخول</button>
      <button id="tabSignup">حساب جديد</button>
    </div>

    <div id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="primary-btn" id="loginBtn">دخول</button>
    </div>

    <div id="signupForm" style="display:none;">
      <div class="field">
        <label>الاسم</label>
        <input type="text" id="suName" placeholder="اسمك الظاهر" autocomplete="name" />
      </div>
      <div class="field">
        <label>لغتك الأساسية</label>
        <select id="suLang">
          <option value="ar">العربية</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="tr">Türkçe</option>
          <option value="de">Deutsch</option>
          <option value="ru">Русский</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="suPass" placeholder="6 أحرف على الأقل" autocomplete="new-password" />
      </div>
      <button class="primary-btn" id="signupBtn">إنشاء الحساب</button>
    </div>

    <div id="authError"></div>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ================= APP SCREEN ================= -->
<div id="appScreen">
  <div class="layout">
    <div class="sidebar show" id="sidebar">
      <div class="search-box">
        <div class="inputWrap">
          <input type="text" id="searchInput" placeholder="ابحث عن مستخدم بالاسم..." />
        </div>
      </div>
      <div class="searchResults" id="searchResults"></div>

      <div id="requestsSection">
        <div class="sectionTitle">طلبات الصداقة <span class="badge" id="reqBadge" style="display:none;">0</span></div>
        <div id="requestsList"></div>
      </div>

      <div class="sectionTitle">الأصدقاء</div>
      <div class="friendsScroll" id="friendsList"></div>
    </div>

    <div class="chatpane" id="chatpane">
      <div class="placeholder" id="chatPlaceholder">
        <div class="big">🌍</div>
        <div class="ph-title">اختر صديقًا من القائمة</div>
        <div>لتبدأ محادثة تُترجم فورًا بين لغتيكما</div>
      </div>

      <div id="chatActive" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="chatHeader">
          <button class="backBtn" id="backBtn">→</button>
          <div class="avatar" id="chatAvatar">?</div>
          <div>
            <div class="name" id="chatName">—</div>
            <div class="lang" id="chatLang">—</div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <button class="iconBtn mic" id="micBtn" title="تسجيل صوتي">🎤</button>
          <textarea id="msgInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
          <button class="iconBtn send" id="sendBtn" title="إرسال">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
